    <script>
      function updateGameScale() {
        var vw = window.innerWidth;
        var vh = window.innerHeight;
        var scale = Math.min(vw / 920, vh / 608, 1);
        var offsetX = Math.round((vw - 920 * scale) / 2);
        var offsetY = Math.round((vh - 608 * scale) / 2);
        document.documentElement.style.setProperty('--game-scale', scale);
        document.documentElement.style.setProperty('--game-offset-x', offsetX + 'px');
        document.documentElement.style.setProperty('--game-offset-y', offsetY + 'px');
        if (scale < 1) {
          document.documentElement.style.setProperty('--bowl-h', Math.min(420, Math.round(608 * 0.37)) + 'px');
        } else {
          document.documentElement.style.removeProperty('--bowl-h');
        }
      }
      // 초기 추정값 (DOM 준비 전)
      updateGameScale();
      // DOM 준비 후 정확한 값으로 재계산 (#root.clientHeight = 100svh 실제 값)
      document.addEventListener('DOMContentLoaded', updateGameScale);
      window.addEventListener('resize', updateGameScale);
      window.addEventListener('orientationchange', function () {
        setTimeout(updateGameScale, 200);
      });
    </script>

  <body>
